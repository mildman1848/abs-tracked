name: Security

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  dockerfile-scan:
    name: Dockerfile Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Hadolint SARIF
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          format: sarif
          output-file: hadolint-results.sarif
          no-fail: true

      - name: Upload Hadolint SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: hadolint-results.sarif
          category: hadolint

      - name: Hadolint aarch64 SARIF
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.aarch64
          config: .hadolint.yaml
          format: sarif
          output-file: hadolint-aarch64-results.sarif
          no-fail: true

      - name: Upload Hadolint aarch64 SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: hadolint-aarch64-results.sarif
          category: hadolint-aarch64

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build single image for scan
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          load: true
          tags: local/abs-tracked:scan

      - name: Trivy image SARIF
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: local/abs-tracked:scan
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Trivy fs SARIF
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy fs SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  secrets-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true
