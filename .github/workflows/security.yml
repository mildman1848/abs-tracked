name: Security

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build single image for scan
        run: docker build -t local/abs-tracked:scan -f Dockerfile .

      - name: Trivy image SARIF
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: local/abs-tracked:scan
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('trivy-image.sarif') != '' }}
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Trivy fs SARIF
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy fs SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('trivy-fs.sarif') != '' }}
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  secrets-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
        continue-on-error: true
